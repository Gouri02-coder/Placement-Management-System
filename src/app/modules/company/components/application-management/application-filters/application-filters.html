<div class="application-filters">
  <div class="filter-group">
    <label>Search</label>
    <div class="search-box">
      <i class="material-icons">search</i>
      <input type="text" placeholder="Search applications..." 
             [(ngModel)]="searchTerm" (input)="onSearchChange()">
    </div>
  </div>

  <div class="filter-group">
    <label>Job</label>
    <select [(ngModel)]="jobFilter" (change)="applyFilters()">
      <option value="all">All Jobs</option>
      <option *ngFor="let job of getUniqueJobs()" [value]="job">{{job}}</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Status</label>
    <select [(ngModel)]="statusFilter" (change)="applyFilters()">
      <option value="all">All Status</option>
      <option value="pending">Pending</option>
      <option value="reviewed">Reviewed</option>
      <option value="shortlisted">Shortlisted</option>
      <option value="rejected">Rejected</option>
      <option value="hired">Hired</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Branch</label>
    <select [(ngModel)]="branchFilter" (change)="applyFilters()">
      <option value="all">All Branches</option>
      <option *ngFor="let branch of getUniqueBranches()" [value]="branch">{{branch}}</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Min CGPA</label>
    <input type="number" [(ngModel)]="minCGPA" (change)="applyFilters()" 
           step="0.1" min="0" max="10" placeholder="e.g., 7.5">
  </div>

  <div class="filter-actions">
    <button class="btn btn-outline btn-clear" (click)="clearFilters()">
      <i class="material-icons">clear</i> Clear
    </button>
  </div>
</div>
