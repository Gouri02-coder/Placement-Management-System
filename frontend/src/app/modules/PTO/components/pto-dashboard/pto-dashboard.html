<section class="pto-dashboard">
  <header class="hero">
    <div>
      <p class="eyebrow">Placement and Training Office</p>
      <h1>PTO dashboard</h1>
      <p class="subtitle">
        Verify student and company records, then keep placement activity under control from one
        workspace.
      </p>
    </div>

    <div class="quick-links">
      <a *ngFor="let link of quickLinks" class="quick-link" [routerLink]="link.route">
        <span>{{ link.label }}</span>
        <small>{{ link.description }}</small>
      </a>
    </div>
  </header>

  <section class="summary-grid">
    <article *ngFor="let item of highlights" class="summary-card">
      <p>{{ item.title }}</p>
      <h2>{{ item.value }}</h2>
      <span>{{ item.detail }}</span>
    </article>
  </section>

  <section class="dashboard-section">
    <app-student-verification></app-student-verification>
  </section>

  <section class="dashboard-section">
    <app-company-verification></app-company-verification>
  </section>

  <section class="dashboard-section">
    <app-placement-monitor></app-placement-monitor>
  </section>
</section>
