<div class="panel">
  <div class="panel-header">
    <div>
      <p class="section-tag">Monitor Placements</p>
      <h2>Placement activity snapshot</h2>
    </div>
  </div>

  <div class="metric-grid">
    <article *ngFor="let metric of metrics" class="metric-card">
      <span>{{ metric.label }}</span>
      <strong>{{ metric.value }}</strong>
      <small>{{ metric.note }}</small>
    </article>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Company</th>
          <th>Role</th>
          <th>Applied</th>
          <th>Shortlisted</th>
          <th>Offers</th>
          <th>Current Stage</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let drive of drives">
          <td>{{ drive.company }}</td>
          <td>{{ drive.role }}</td>
          <td>{{ drive.applied }}</td>
          <td>{{ drive.shortlisted }}</td>
          <td>{{ drive.offers }}</td>
          <td>{{ drive.stage }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
