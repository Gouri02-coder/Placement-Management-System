<div class="login-container">
  <div class="login-card">
    <h2>Welcome Back! 👋</h2>
    <p class="subtitle">Sign in to your account</p>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="Enter your email address">
        <div class="error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Valid email is required
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="Enter your password">
        <div class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password is required
        </div>
      </div>

      <button 
        type="submit" 
        class="login-btn" 
        [disabled]="loginForm.invalid || isLoading">
        {{isLoading ? 'Signing in...' : 'Sign In'}}
      </button>


      <div class="register-link">
        Don't have an account? <a (click)="goToRegister()">Create one here</a>
      </div>
    </form>
  </div>
</div>
