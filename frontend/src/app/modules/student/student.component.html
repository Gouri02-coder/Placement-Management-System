<div class="student-layout">
  <aside class="sidebar">
    <div class="brand-header">
      <div class="brand-logo">S</div>
      <span class="brand-name">Student Portal</span>
    </div>

    <nav>
      <div class="nav-label">Management</div>

      <a routerLink="/student/dashboard" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">DB</span> Dashboard
      </a>
      <a routerLink="/student/job-portals" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">JB</span> Explore Jobs
      </a>
      <a routerLink="/student/applications" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">AP</span> My Applications
      </a>
      <a routerLink="/student/interviews" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">IV</span> Interviews
      </a>
      <a routerLink="/student/resume-builder" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">CV</span> Resume Builder
      </a>
      <a routerLink="/student/placement-drives" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">PD</span> Placement Drives
      </a>
      <a routerLink="/student/profile" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">PF</span> Profile Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar">{{ student?.personalInfo?.firstName?.[0] || 'S' }}</div>
        <div class="user-meta">
          <span class="name">{{ student?.personalInfo?.firstName || 'Student' }}</span>
          <span class="role">Student</span>
        </div>
      </div>

      <button class="logout-btn" (click)="onLogout()">
        <span class="nav-icon">LO</span> Sign Out
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="main-glow glow-one"></div>
    <div class="main-glow glow-two"></div>
    <div class="main-glow glow-three"></div>

    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
