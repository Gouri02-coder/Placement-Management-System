<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">P</div>
      <span class="logo-text">Placement<span>Pro</span></span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/student/dashboard" routerLinkActive="active" class="nav-item">
        <i class="ph-bold ph-house"></i> <span>Dashboard</span>
      </a>
      <a routerLink="/student/job/job-search" routerLinkActive="active" class="nav-item">
        <i class="ph-bold ph-magnifying-glass"></i> <span>Explore Jobs</span>
      </a>
      <a routerLink="/student/applications" routerLinkActive="active" class="nav-item">
        <i class="ph-bold ph-file-text"></i> <span>My Applications</span>
      </a>
      <a routerLink="/student/interviews/schedule" routerLinkActive="active" class="nav-item">
        <i class="ph-bold ph-calendar"></i> <span>Interviews</span>
      </a>
      <div class="nav-divider"></div>
      <a routerLink="/student/resume-builder" routerLinkActive="active" class="nav-item">
        <i class="ph-bold ph-scroll"></i> <span>Resume Builder</span>
      </a>
      <a routerLink="/student/profile" routerLinkActive="active" class="nav-item">
        <i class="ph-bold ph-user-gear"></i> <span>Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="onLogout()">
        <i class="ph-bold ph-sign-out"></i> <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <main class="main-wrapper">
    <header class="top-navbar">
      <div class="search-bar">
        <i class="ph-bold ph-magnifying-glass"></i>
        <input type="text" placeholder="Search for jobs, companies...">
      </div>
      <div class="top-actions">
        <button class="icon-btn"><i class="ph-bold ph-bell"></i></button>
        <div class="user-profile" routerLink="/student/profile">
          <div class="avatar">{{ student?.personalInfo?.firstName?.[0] || 'S' }}</div>
          <div class="user-meta">
            <span class="name">{{ student?.personalInfo?.firstName }}</span>
            <span class="role">Student</span>
          </div>
        </div>
      </div>
    </header>

    <section class="content-body">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
