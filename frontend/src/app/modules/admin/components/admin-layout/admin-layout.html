<div class="admin-shell">
  <aside class="admin-sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="brand-row">
      <div class="brand-mark">PM</div>
      <div class="brand-copy" *ngIf="!sidebarCollapsed">
        <h2>Admin Console</h2>
        <p>Placement Management</p>
      </div>
      <button type="button" class="toggle-btn" (click)="toggleSidebar()">
        {{ sidebarCollapsed ? '>' : '<' }}
      </button>
    </div>

    <nav class="nav-list">
      <a
        *ngFor="let item of navItems; trackBy: trackNav"
        [routerLink]="item.route"
        routerLinkActive="active"
        class="nav-link"
        [title]="item.label">
        <span class="nav-icon" [ngSwitch]="item.icon" aria-hidden="true">
          <svg *ngSwitchCase="'dashboard'" viewBox="0 0 24 24"><path d="M3 3h8v8H3V3Zm10 0h8v5h-8V3ZM3 13h8v8H3v-8Zm10-3h8v11h-8V10Z"/></svg>
          <svg *ngSwitchCase="'students'" viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm-7 8a7 7 0 0 1 14 0Zm14-8a3 3 0 1 0-3-3 3 3 0 0 0 3 3Zm-1.5 2.2A5.7 5.7 0 0 1 21 20h-3a7.8 7.8 0 0 0-1.5-5.8Z"/></svg>
          <svg *ngSwitchCase="'companies'" viewBox="0 0 24 24"><path d="M3 21V7l9-4 9 4v14h-6v-6H9v6Zm4-4h2v-2H7Zm0-4h2v-2H7Zm0-4h2V7H7Zm4 8h2v-2h-2Zm0-4h2v-2h-2Zm0-4h2V7h-2Zm4 8h2v-2h-2Zm0-4h2v-2h-2Zm0-4h2V7h-2Z"/></svg>
          <svg *ngSwitchCase="'approval'" viewBox="0 0 24 24"><path d="M12 2 3 6v6c0 5 3.8 9.7 9 10 5.2-.3 9-5 9-10V6Zm-1 14-4-4 1.4-1.4 2.6 2.6 5.6-5.6L18 9Z"/></svg>
          <svg *ngSwitchCase="'drives'" viewBox="0 0 24 24"><path d="M4 4h16v4H4Zm2 6h12v10H6Zm3 2v2h6v-2Zm0 4v2h4v-2Z"/></svg>
          <svg *ngSwitchCase="'schedule'" viewBox="0 0 24 24"><path d="M7 2h2v2h6V2h2v2h3v18H4V4Zm11 6H6v12h12Zm-8 3h2v2h-2Zm4 0h2v2h-2Zm-4 4h2v2h-2Z"/></svg>
          <svg *ngSwitchCase="'reports'" viewBox="0 0 24 24"><path d="M5 3h10l4 4v14H5Zm9 1.5V8h3.5ZM8 12h8v2H8Zm0 4h8v2H8Zm0-8h4v2H8Z"/></svg>
        </span>
        <span class="nav-copy" *ngIf="!sidebarCollapsed">
          <span class="nav-label">{{ item.label }}</span>
          <small>{{ item.hint }}</small>
        </span>
      </a>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="topbar">
      <div>
        <h1>Administrator Workspace</h1>
        <p>Interactive dashboard for students, companies, drives, and reporting.</p>
      </div>
      <a class="open-link" routerLink="/admin/dashboard">Open Admin Home</a>
    </header>

    <section class="view-wrapper">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
